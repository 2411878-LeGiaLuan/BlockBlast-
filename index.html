<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGBank Block Blast v5.0 - Definitive</title>
    <style>
        :root {
            --bg: #040812; --grid: #1a233a; --cell: #252f48;
            --c1: #ff3b3b; --c2: #0099ff; --c3: #00f281; --c4: #ffcc00; --c5: #af52ff;
        }
        * { box-sizing: border-box; touch-action: none; user-select: none; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        /* HEADER & SCORE */
        #header { padding: 40px 20px 10px; text-align: center; width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; }
        .score-item { display: flex; flex-direction: column; }
        .label { font-size: 10px; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; }
        #score-val { font-size: 40px; font-weight: 900; color: #fff; }
        #high-val { font-size: 18px; color: #fbbf24; font-weight: 700; }

        /* GRID */
        #game-board { 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; 
            padding: 12px; background: var(--grid); border-radius: 20px;
            width: 94vw; max-width: 400px; aspect-ratio: 1; position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .cell { background: var(--cell); border-radius: 6px; transition: 0.15s; }
        .cell.highlight { box-shadow: inset 0 0 15px rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); }
        .cell.hint-on { animation: hintFlash 0.5s ease 3; }
        @keyframes hintFlash { 50% { background: #fff; box-shadow: 0 0 20px #fff; } }

        /* STASH */
        #stash { display: flex; justify-content: space-around; width: 100%; max-width: 420px; height: 130px; margin-top: auto; padding-bottom: 20px; }
        .stash-item { width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); border-radius: 15px; }

        /* BLOCKS */
        .shape-container { display: grid; cursor: grab; position: relative; transition: transform 0.2s; }
        .block-unit { 
            width: 32px; height: 32px; border-radius: 6px; 
            border: 1px solid rgba(0,0,0,0.2); 
            box-shadow: inset 0 3px 6px rgba(255,255,255,0.3);
        }
        .dragging { transform: scale(1.05) !important; position: fixed !important; pointer-events: none; z-index: 1000; filter: brightness(1.2); }

        /* GAME OVER MODAL */
        #game-over {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
            backdrop-filter: blur(10px);
        }
        #game-over h2 { font-size: 48px; margin-bottom: 20px; color: #ff3b3b; text-shadow: 0 0 20px #ff3b3b; }
        .btn { 
            background: #0099ff; color: white; border: none; padding: 15px 40px; 
            border-radius: 30px; font-weight: 800; font-size: 18px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,153,255,0.4);
        }
        #hint-btn {
            position: absolute; bottom: 150px; right: 20px;
            background: #fbbf24; color: #000; border: none; width: 50px; height: 50px;
            border-radius: 50%; font-weight: 900; cursor: pointer; box-shadow: 0 5px 15px rgba(251,191,36,0.3);
        }
    </style>
</head>
<body>

    <div id="header">
        <div class="score-item">
            <span class="label">Best</span>
            <span id="high-val">0</span>
        </div>
        <div class="score-item">
            <span class="label">Score</span>
            <span id="score-val">0</span>
        </div>
    </div>

    <div id="game-board"></div>

    <button id="hint-btn">💡</button>

    <div id="stash">
        <div class="stash-item" id="s1"></div>
        <div class="stash-item" id="s2"></div>
        <div class="stash-item" id="s3"></div>
    </div>

    <div id="game-over">
        <h2>THUA RỒI!</h2>
        <p style="margin-bottom: 20px; opacity: 0.7;">Điểm của bạn:</p>
        <div id="final-score" style="font-size: 40px; font-weight: 900; margin-bottom: 40px;">0</div>
        <button class="btn" onclick="location.reload()">CHƠI LẠI</button>
    </div>

<script>
    const GRID_SIZE = 8;
    const board = document.getElementById('game-board');
    let score = 0;
    let highScore = localStorage.getItem('LGB_BEST') || 0;
    let gridData = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
    let cells = [];
    let isTouch = 'ontouchstart' in window;

    // AUDIO SYSTEM
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const SHAPES = [
        { data: [[1,1],[1,1]], color: 'var(--c1)' }, { data: [[1,1,1,1]], color: 'var(--c2)' },
        { data: [[1,1,1],[0,1,0]], color: 'var(--c3)' }, { data: [[1,1,1],[1,0,0]], color: 'var(--c4)' },
        { data: [[1,1,0],[0,1,1]], color: 'var(--c5)' }, { data: [[1,1],[1,0]], color: 'var(--c3)' }
    ];

    function init() {
        document.getElementById('high-val').innerText = highScore;
        for (let r = 0; r < GRID_SIZE; r++) {
            cells[r] = [];
            for (let c = 0; c < GRID_SIZE; c++) {
                const el = document.createElement('div');
                el.className = 'cell';
                board.appendChild(el);
                cells[r][c] = el;
            }
        }
        spawn();
    }

    function createShape(info) {
        const div = document.createElement('div');
        div.className = 'shape-container';
        div.style.gridTemplateColumns = `repeat(${info.data[0].length}, 32px)`;
        div.dataset.info = JSON.stringify(info);
        info.data.forEach(row => {
            row.forEach(v => {
                const b = document.createElement('div');
                if(v) { b.className = 'block-unit'; b.style.background = info.color; }
                div.appendChild(b);
            });
        });
        div.onmousedown = (e) => startDrag(e, div);
        div.ontouchstart = (e) => startDrag(e.touches[0], div);
        return div;
    }

    let drag = null;
    function startDrag(e, el) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        playSound(440, 'sine', 0.1);
        const rect = el.getBoundingClientRect();
        drag = {
            el: el, info: JSON.parse(el.dataset.info),
            offsetX: el.offsetWidth / 2,
            offsetY: isTouch ? 90 : el.offsetHeight / 2
        };
        el.classList.add('dragging');
        moveDrag(e);
    }

    function moveDrag(e) {
        if(!drag) return;
        drag.el.style.left = (e.clientX - drag.offsetX) + 'px';
        drag.el.style.top = (e.clientY - drag.offsetY) + 'px';
        
        // Highlight preview
        clearHighlights();
        const pY = isTouch ? e.clientY - 60 : e.clientY;
        const target = document.elementFromPoint(e.clientX, pY);
        if(target && target.className.includes('cell')) {
            const idx = Array.from(board.children).indexOf(target);
            const r = Math.floor(idx/8), c = idx%8;
            if(canPlace(drag.info.data, r, c)) {
                drag.info.data.forEach((row, i) => row.forEach((v, j) => {
                    if(v) cells[r+i][c+j].classList.add('highlight');
                }));
            }
        }
    }

    window.onmousemove = (e) => moveDrag(e);
    window.ontouchmove = (e) => moveDrag(e.touches[0]);

    window.onmouseup = window.ontouchend = (e) => {
        if(!drag) return;
        const p = e.changedTouches ? e.changedTouches[0] : e;
        const pY = isTouch ? p.clientY - 60 : p.clientY;
        const target = document.elementFromPoint(p.clientX, pY);
        
        let placed = false;
        if(target && target.className.includes('cell')) {
            const idx = Array.from(board.children).indexOf(target);
            const r = Math.floor(idx/8), c = idx%8;
            if(canPlace(drag.info.data, r, c)) {
                doPlace(drag.info, r, c);
                drag.el.remove();
                placed = true;
                playSound(220, 'square', 0.2);
                checkBoard();
                if(!document.querySelector('.shape-container')) spawn();
                checkLose();
            }
        }
        
        if(!placed) {
            drag.el.classList.remove('dragging');
            drag.el.style.position = 'relative';
            drag.el.style.left = '0'; drag.el.style.top = '0';
        }
        clearHighlights();
        drag = null;
    };

    function canPlace(data, r, c) {
        for(let i=0; i<data.length; i++) {
            for(let j=0; j<data[i].length; j++) {
                if(data[i][j] && (r+i >= 8 || c+j >= 8 || gridData[r+i][c+j])) return false;
            }
        }
        return true;
    }

    function doPlace(info, r, c) {
        info.data.forEach((row, i) => {
            row.forEach((v, j) => {
                if(v) {
                    gridData[r+i][c+j] = info.color;
                    cells[r+i][c+j].style.background = info.color;
                    cells[r+i][c+j].style.boxShadow = 'inset 0 0 12px rgba(255,255,255,0.4), 0 0 10px '+info.color;
                }
            });
        });
    }

    function checkBoard() {
        let rs = [], cs = [];
        for(let i=0; i<8; i++) {
            if(gridData[i].every(v => v)) rs.push(i);
            if(gridData.every(row => row[i])) cs.push(i);
        }
        if(rs.length + cs.length > 0) {
            playSound(880, 'sine', 0.5);
            rs.forEach(r => { for(let j=0; j<8; j++) clearCell(r,j); });
            cs.forEach(c => { for(let i=0; i<8; i++) clearCell(i,c); });
            score += (rs.length + cs.length) * 100;
            document.getElementById('score-val').innerText = score;
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('LGB_BEST', highScore);
                document.getElementById('high-val').innerText = highScore;
            }
        }
    }

    function clearCell(r, c) {
        gridData[r][c] = null;
        cells[r][c].style.background = '';
        cells[r][c].style.boxShadow = '';
    }

    function spawn() {
        [1,2,3].forEach(i => document.getElementById('s'+i).appendChild(createShape(SHAPES[Math.floor(Math.random()*SHAPES.length)])));
    }

    function checkLose() {
        const containers = document.querySelectorAll('.shape-container');
        let possible = false;
        containers.forEach(c => {
            const data = JSON.parse(c.dataset.info).data;
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) if(canPlace(data, r, c)) possible = true;
            }
        });
        if(!possible && containers.length > 0) {
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over').style.display = 'flex';
        }
    }

    document.getElementById('hint-btn').onclick = () => {
        const s = document.querySelector('.shape-container');
        if(!s) return;
        const data = JSON.parse(s.dataset.info).data;
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                if(canPlace(data, r, c)) {
                    data.forEach((row, i) => row.forEach((v, j) => {
                        if(v) cells[r+i][c+j].classList.add('hint-on');
                    }));
                    setTimeout(() => cells.flat().forEach(c => c.classList.remove('hint-on')), 1500);
                    return;
                }
            }
        }
    };

    function clearHighlights() { cells.flat().forEach(c => c.classList.remove('highlight')); }

    init();
</script>
</body>
</html>
