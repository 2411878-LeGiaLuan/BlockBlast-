<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGBank Block Blast v7.1 - Ultimate Sound</title>
    <style>
        :root {
            --bg: #030712; --grid: #111827; --cell: #1f2937;
            --c1: #ef4444; --c2: #3b82f6; --c3: #10b981; --c4: #f59e0b; --c5: #8b5cf6; --c6: #ec4899;
        }
        * { box-sizing: border-box; touch-action: none; user-select: none; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: white; font-family: system-ui, sans-serif;
            height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        #header { padding: 40px 20px 20px; width: 100%; max-width: 400px; display: flex; justify-content: space-between; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 12px 24px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .label { font-size: 11px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; display: block; }
        .val { font-size: 32px; font-weight: 800; }

        #game-container { position: relative; padding: 12px; background: #0f172a; border-radius: 28px; box-shadow: 0 25px 50px rgba(0,0,0,0.8); }
        #game-board { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; width: 92vw; max-width: 380px; aspect-ratio: 1; }
        .cell { background: var(--cell); border-radius: 8px; transition: 0.1s; position: relative; }
        .cell.active-preview { background: rgba(255,255,255,0.2) !important; box-shadow: inset 0 0 15px rgba(255,255,255,0.3); }

        #stash { display: flex; justify-content: space-around; width: 100%; max-width: 420px; height: 140px; margin-top: auto; padding-bottom: 40px; }
        .stash-slot { width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); border-radius: 24px; }
        
        .shape-container { display: grid; gap: 2px; cursor: grab; }
        .block-unit { width: 32px; height: 32px; border-radius: 7px; border: 1px solid rgba(0,0,0,0.15); box-shadow: inset 0 4px 8px rgba(255,255,255,0.2); }
        .dragging { position: fixed !important; transform: scale(1.1) !important; z-index: 1000; pointer-events: none; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6)); }

        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .modal { background: #1f2937; padding: 40px; border-radius: 32px; text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 85%; }
        .final-score { font-size: 72px; font-weight: 900; margin: 10px 0 30px; }
        .btn-restart { background: #3b82f6; color: white; border: none; padding: 18px; border-radius: 20px; font-size: 20px; font-weight: 700; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="header">
        <div class="stat-box"><span class="label">Best</span><span id="best-score" class="val">0</span></div>
        <div class="stat-box"><span class="label">Score</span><span id="current-score" class="val">0</span></div>
    </div>

    <div id="game-container"><div id="game-board"></div></div>

    <div id="stash">
        <div class="stash-slot" id="slot-0"></div>
        <div class="stash-slot" id="slot-1"></div>
        <div class="stash-slot" id="slot-2"></div>
    </div>

    <div id="overlay">
        <div class="modal">
            <h2 style="color: #94a3b8;">GAME OVER</h2>
            <div class="final-score" id="fs">0</div>
            <button class="btn-restart" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

<script>
    const GRID = 8;
    const boardEl = document.getElementById('game-board');
    let score = 0, best = localStorage.getItem('LGB_FINAL_BEST') || 0;
    let grid = Array(GRID).fill().map(() => Array(GRID).fill(null));
    let cells = [];

    // AUDIO SYSTEM (Web Audio API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(freq, type, dur, vol = 0.1) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    const SHAPES = [
        { d: [[1,1],[1,1]], c: 'var(--c1)' }, { d: [[1,1,1,1]], c: 'var(--c2)' },
        { d: [[1,1,1],[0,1,0]], c: 'var(--c3)' }, { d: [[1,1,1],[1,0,0]], c: 'var(--c4)' },
        { d: [[1,1,0],[0,1,1]], c: 'var(--c5)' }, { d: [[1,1]], c: 'var(--c6)' },
        { d: [[1]], c: '#fff' }
    ];

    function init() {
        document.getElementById('best-score').innerText = best;
        for (let r = 0; r < GRID; r++) {
            cells[r] = [];
            for (let c = 0; c < GRID; c++) {
                const div = document.createElement('div');
                div.className = 'cell';
                boardEl.appendChild(div);
                cells[r][c] = div;
            }
        }
        spawn();
    }

    function createShape(info) {
        const wrap = document.createElement('div');
        wrap.className = 'shape-container';
        wrap.style.gridTemplateColumns = `repeat(${info.d[0].length}, 32px)`;
        wrap.dataset.info = JSON.stringify(info);
        info.d.forEach(row => {
            row.forEach(v => {
                const b = document.createElement('div');
                if(v) { b.className = 'block-unit'; b.style.background = info.c; }
                else { b.style.opacity = '0'; }
                wrap.appendChild(b);
            });
        });
        const handler = (e) => startDrag(e.touches ? e.touches[0] : e, wrap);
        wrap.onmousedown = wrap.ontouchstart = handler;
        return wrap;
    }

    let active = null;
    function startDrag(e, el) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        playSfx(400, 'sine', 0.1, 0.05);
        active = {
            el: el, info: JSON.parse(el.dataset.info),
            offX: el.offsetWidth / 2,
            offY: ('ontouchstart' in window) ? 90 : el.offsetHeight / 2
        };
        el.classList.add('dragging');
        move(e);
    }

    function move(e) {
        if(!active) return;
        active.el.style.left = (e.clientX - active.offX) + 'px';
        active.el.style.top = (e.clientY - active.offY) + 'px';
        clearPreviews();
        const pos = findFit(e.clientX, e.clientY - (('ontouchstart' in window) ? 60 : 0));
        if(pos) {
            active.info.d.forEach((row, i) => row.forEach((v, j) => {
                if(v) cells[pos.r+i][pos.c+j].classList.add('active-preview');
            }));
        }
    }

    function findFit(mX, mY) {
        let bestDist = 45, bestPos = null;
        for(let r=0; r <= GRID - active.info.d.length; r++) {
            for(let c=0; c <= GRID - active.info.d[0].length; c++) {
                if(canFit(active.info.d, r, c)) {
                    const rect = cells[r][c].getBoundingClientRect();
                    const d = Math.hypot(rect.left - (mX - active.offX), rect.top - mY);
                    if(d < bestDist) { bestDist = d; bestPos = {r, c}; }
                }
            }
        }
        return bestPos;
    }

    window.onmousemove = move;
    window.ontouchmove = (e) => move(e.touches[0]);

    window.onmouseup = window.ontouchend = (e) => {
        if(!active) return;
        const p = e.changedTouches ? e.changedTouches[0] : e;
        const pos = findFit(p.clientX, p.clientY - (('ontouchstart' in window) ? 60 : 0));
        if(pos) {
            place(active.info, pos.r, pos.c);
            active.el.remove();
            playSfx(200, 'triangle', 0.15, 0.2);
            checkClear();
            if(!document.querySelector('.shape-container')) spawn();
            if(isLose()) finish();
        } else {
            active.el.classList.remove('dragging');
            active.el.style.left = '0'; active.el.style.top = '0'; active.el.style.position = 'relative';
        }
        clearPreviews(); active = null;
    };

    function canFit(d, r, c) {
        for(let i=0; i<d.length; i++) 
            for(let j=0; j<d[0].length; j++) 
                if(d[i][j] && grid[r+i][c+j]) return false;
        return true;
    }

    function place(info, r, c) {
        info.d.forEach((row, i) => row.forEach((v, j) => {
            if(v) { grid[r+i][c+j] = info.c; cells[r+i][c+j].style.background = info.c; }
        }));
    }

    function checkClear() {
        let rs = [], cs = [];
        for(let i=0; i<GRID; i++) {
            if(grid[i].every(v => v)) rs.push(i);
            if(grid.every(row => row[i])) cs.push(i);
        }
        if(rs.length + cs.length > 0) {
            playSfx(800, 'sine', 0.4, 0.1);
            rs.forEach(r => { for(let j=0; j<GRID; j++) clearC(r, j); });
            cs.forEach(c => { for(let i=0; i<GRID; i++) clearC(i, c); });
            score += (rs.length + cs.length) * 100;
            document.getElementById('current-score').innerText = score;
            if(score > best) { best = score; localStorage.setItem('LGB_FINAL_BEST', best); document.getElementById('best-score').innerText = best; }
        }
    }

    function clearC(r, c) { grid[r][c] = null; cells[r][c].style.background = ''; }
    function spawn() { for(let i=0; i<3; i++) document.getElementById('slot-'+i).appendChild(createShape(SHAPES[Math.floor(Math.random()*SHAPES.length)])); }
    function clearPreviews() { cells.flat().forEach(c => c.classList.remove('active-preview')); }
    function isLose() {
        const shapes = document.querySelectorAll('.shape-container');
        let can = false;
        shapes.forEach(s => {
            const d = JSON.parse(s.dataset.info).d;
            for(let r=0; r<=GRID-d.length; r++) for(let c=0; c<=GRID-d[0].length; c++) if(canFit(d, r, c)) can = true;
        });
        return !can;
    }
    function finish() { document.getElementById('fs').innerText = score; document.getElementById('overlay').style.display = 'flex'; }
    init();
</script>
</body>
</html>
