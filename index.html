<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast LG v2.0</title>
    <style>
        :root {
            --bg: #0f172a; --grid: #1e293b; --cell: #334155;
            --c1: #ef4444; --c2: #3b82f6; --c3: #10b981; --c4: #f59e0b; --c5: #8b5cf6;
        }
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: var(--bg); 
            font-family: sans-serif; color: white; 
            height: 100vh; display: flex; flex-direction: column; align-items: center; 
        }

        /* SCORE */
        #header { width: 100%; padding: 40px 20px 10px; text-align: center; }
        #score-val { font-size: 40px; font-weight: 800; color: #fbbf24; }
        
        /* GRID */
        #game-board { 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; 
            padding: 6px; background: var(--grid); border-radius: 12px;
            width: 92vw; max-width: 380px; aspect-ratio: 1; margin-top: 10px;
        }
        .cell { background: var(--cell); border-radius: 4px; position: relative; }
        .cell.filled { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: scale(1); }

        /* STASH (KHO) */
        #stash { 
            display: flex; justify-content: space-around; align-items: center;
            width: 100%; max-width: 400px; height: 160px; margin-top: auto; padding-bottom: 20px;
        }
        .stash-item { width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; }

        /* SHAPES */
        .shape-container { display: grid; transform: scale(0.65); transition: transform 0.2s; }
        .block-unit { width: 25px; height: 25px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); box-shadow: inset 0 0 8px rgba(255,255,255,0.2); }
        .dragging { transform: scale(1.1) !important; opacity: 0.8; z-index: 1000; pointer-events: none; }

        /* BLAST EFFECT */
        @keyframes blast {
            0% { transform: scale(1); opacity: 1; filter: brightness(2); }
            100% { transform: scale(0); opacity: 0; }
        }
        .blasting { animation: blast 0.5s ease-out forwards; }

        #game-over {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
    </style>
</head>
<body>

        <div style="font-size: 14px; opacity: 0.7;">SCORE</div>
        <div id="score-val">0</div>
    </div>

    <div id="game-board"></div>
