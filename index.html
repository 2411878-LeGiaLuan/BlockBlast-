<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGBank Block Blast v6.0 - Prestige</title>
    <style>
        :root {
            --bg: #020617; --grid: #1e293b; --cell: #334155;
            --c1: #ff4757; --c2: #2ed573; --c3: #1e90ff; --c4: #ffa502; --c5: #e056fd; --c6: #7bed9e;
        }
        * { box-sizing: border-box; touch-action: none; user-select: none; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        /* HEADER */
        #header { padding: 40px 20px 20px; width: 100%; max-width: 400px; display: flex; justify-content: space-between; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .label { font-size: 10px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; display: block; }
        .val { font-size: 28px; font-weight: 900; }

        /* GAME BOARD */
        #game-container { position: relative; padding: 10px; background: #0f172a; border-radius: 24px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        #game-board { 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; 
            width: 90vw; max-width: 380px; aspect-ratio: 1;
        }
        .cell { background: var(--cell); border-radius: 8px; transition: all 0.2s; position: relative; }
        .cell.preview { background: rgba(255,255,255,0.15) !important; box-shadow: inset 0 0 10px rgba(255,255,255,0.2); }

        /* STASH & ITEMS */
        #stash { display: flex; justify-content: space-around; width: 100%; max-width: 420px; height: 140px; margin-top: auto; padding-bottom: 30px; }
        .stash-slot { width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); border-radius: 20px; }
        
        .shape-container { display: grid; gap: 2px; cursor: grab; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .block-unit { width: 30px; height: 30px; border-radius: 6px; position: relative; overflow: hidden; border: 1px solid rgba(0,0,0,0.1); }
        .block-unit::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%); }

        .dragging { position: fixed !important; transform: scale(1.1) !important; z-index: 1000; pointer-events: none; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }

        /* MODAL GAME OVER */
        #overlay {
            position: fixed; inset: 0; background: rgba(2,6,23,0.95); backdrop-filter: blur(8px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal { background: #1e293b; padding: 40px; border-radius: 32px; text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 85%; max-width: 350px; }
        .modal h2 { font-size: 32px; color: #f87171; margin-bottom: 10px; }
        .final-score { font-size: 64px; font-weight: 900; margin: 20px 0; color: #fff; }
        .btn-restart { background: #3b82f6; color: white; border: none; padding: 16px 40px; border-radius: 16px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn-restart:active { transform: scale(0.95); }

        /* PARTICLES */
        .p { position: absolute; pointer-events: none; border-radius: 2px; animation: fly 0.6s ease-out forwards; }
        @keyframes fly { 100% { transform: translate(var(--x), var(--y)) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="header">
        <div class="stat-box"><span class="label">Best</span><span id="best-score" class="val">0</span></div>
        <div class="stat-box"><span class="label">Score</span><span id="current-score" class="val">0</span></div>
    </div>

    <div id="game-container">
        <div id="game-board"></div>
    </div>

    <div id="stash">
        <div class="stash-slot" id="slot-0"></div>
        <div class="stash-slot" id="slot-1"></div>
        <div class="stash-slot" id="slot-2"></div>
    </div>

    <div id="overlay">
        <div class="modal">
            <h2>HẾT LƯỢT!</h2>
            <span class="label">Tổng điểm của bạn</span>
            <div class="final-score" id="fs">0</div>
            <button class="btn-restart" onclick="location.reload()">THỬ LẠI NGAY</button>
        </div>
    </div>

<script>
    const GRID = 8;
    const boardEl = document.getElementById('game-board');
    let score = 0;
    let best = localStorage.getItem('LGB_PRESTIGE_BEST') || 0;
    let grid = Array(GRID).fill().map(() => Array(GRID).fill(null));
    let cells = [];

    // Tăng cường đa dạng khối hình
    const SHAPES = [
        { d: [[1,1],[1,1]], c: 'var(--c1)' }, { d: [[1,1,1,1]], c: 'var(--c2)' },
        { d: [[1,1,1],[0,1,0]], c: 'var(--c3)' }, { d: [[1,1,1],[1,0,0]], c: 'var(--c4)' },
        { d: [[1,1,0],[0,1,1]], c: 'var(--c5)' }, { d: [[1,1,1]], c: 'var(--c6)' },
        { d: [[1,1],[1,0]], c: 'var(--c1)' }, { d: [[1]], c: '#fff' },
        { d: [[1,0],[1,0],[1,1]], c: 'var(--c3)' }, { d: [[1,1,1],[0,0,1]], c: 'var(--c5)' }
    ];

    function init() {
        document.getElementById('best-score').innerText = best;
        for (let r = 0; r < GRID; r++) {
            cells[r] = [];
            for (let c = 0; c < GRID; c++) {
                const div = document.createElement('div');
                div.className = 'cell';
                boardEl.appendChild(div);
                cells[r][c] = div;
            }
        }
        spawn();
    }

    function createShape(info) {
        const wrap = document.createElement('div');
        wrap.className = 'shape-container';
        wrap.style.gridTemplateColumns = `repeat(${info.d[0].length}, 30px)`;
        wrap.dataset.info = JSON.stringify(info);
        
        info.d.forEach(row => {
            row.forEach(v => {
                const b = document.createElement('div');
                if(v) { b.className = 'block-unit'; b.style.background = info.c; b.style.boxShadow = `0 4px 0 rgba(0,0,0,0.2), inset 0 0 8px rgba(255,255,255,0.4)`; }
                else { b.style.opacity = '0'; }
                wrap.appendChild(b);
            });
        });

        wrap.onmousedown = (e) => startDrag(e, wrap);
        wrap.ontouchstart = (e) => startDrag(e.touches[0], wrap);
        return wrap;
    }

    let active = null;
    function startDrag(e, el) {
        const rect = el.getBoundingClientRect();
        active = {
            el: el, info: JSON.parse(el.dataset.info),
            w: el.offsetWidth, h: el.offsetHeight,
            offX: el.offsetWidth / 2,
            offY: ('ontouchstart' in window) ? 80 : el.offsetHeight / 2
        };
        el.classList.add('dragging');
        onMove(e);
    }

    function onMove(e) {
        if(!active) return;
        active.el.style.left = (e.clientX - active.offX) + 'px';
        active.el.style.top = (e.clientY - active.offY) + 'px';

        // Hệ thống quét tọa độ chuẩn xác (Hitbox Refactor)
        clearPreviews();
        const checkY = ('ontouchstart' in window) ? e.clientY - 60 : e.clientY;
        const target = document.elementFromPoint(e.clientX, checkY);
        
        if(target && target.className.includes('cell')) {
            const idx = Array.from(boardEl.children).indexOf(target);
            const r = Math.floor(idx/GRID), c = idx%GRID;
            if(canFit(active.info.d, r, c)) {
                active.info.d.forEach((row, i) => row.forEach((v, j) => {
                    if(v) cells[r+i][c+j].classList.add('preview');
                }));
            }
        }
    }

    window.onmousemove = onMove;
    window.ontouchmove = (e) => onMove(e.touches[0]);

    window.onmouseup = window.ontouchend = (e) => {
        if(!active) return;
        const p = e.changedTouches ? e.changedTouches[0] : e;
        const checkY = ('ontouchstart' in window) ? p.clientY - 60 : p.clientY;
        const target = document.elementFromPoint(p.clientX, checkY);
        
        let success = false;
        if(target && target.className.includes('cell')) {
            const idx = Array.from(boardEl.children).indexOf(target);
            const r = Math.floor(idx/GRID), c = idx%GRID;
            if(canFit(active.info.d, r, c)) {
                place(active.info, r, c);
                active.el.remove();
                success = true;
                checkClear();
                if(!document.querySelector('.shape-container')) spawn();
                if(isGameOver()) finish();
            }
        }

        if(!success) {
            active.el.classList.remove('dragging');
            active.el.style.position = 'relative';
            active.el.style.left = '0'; active.el.style.top = '0';
        }
        clearPreviews();
        active = null;
    };

    function canFit(data, r, c) {
        for(let i=0; i<data.length; i++) {
            for(let j=0; j<data[0].length; j++) {
                if(data[i][j]) {
                    if(r+i >= GRID || c+j >= GRID || grid[r+i][c+j]) return false;
                }
            }
        }
        return true;
    }

    function place(info, r, c) {
        info.d.forEach((row, i) => row.forEach((v, j) => {
            if(v) {
                grid[r+i][c+j] = info.c;
                cells[r+i][c+j].style.background = info.c;
                cells[r+i][c+j].style.boxShadow = 'inset 0 0 15px rgba(255,255,255,0.4)';
            }
        }));
    }

    function checkClear() {
        let rows = [], cols = [];
        for(let i=0; i<GRID; i++) {
            if(grid[i].every(v => v)) rows.push(i);
            let cFull = true;
            for(let j=0; j<GRID; j++) if(!grid[j][i]) cFull = false;
            if(cFull) cols.push(i);
        }

        if(rows.length + cols.length > 0) {
            rows.forEach(r => { for(let j=0; j<GRID; j++) explode(r, j); });
            cols.forEach(c => { for(let i=0; i<GRID; i++) explode(i, c); });
            score += (rows.length + cols.length) * 100;
            document.getElementById('current-score').innerText = score;
            if(score > best) {
                best = score;
                localStorage.setItem('LGB_PRESTIGE_BEST', best);
                document.getElementById('best-score').innerText = best;
            }
        }
    }

    function explode(r, c) {
        const color = grid[r][c];
        grid[r][c] = null;
        const cell = cells[r][c];
        for(let i=0; i<6; i++) {
            const p = document.createElement('div');
            p.className = 'p'; p.style.background = color;
            p.style.width = p.style.height = '6px';
            p.style.setProperty('--x', (Math.random()-0.5)*120+'px');
            p.style.setProperty('--y', (Math.random()-0.5)*120+'px');
            cell.appendChild(p);
        }
        setTimeout(() => { cell.style.background = ''; cell.style.boxShadow = ''; cell.innerHTML = ''; }, 500);
    }

    function spawn() {
        for(let i=0; i<3; i++) {
            document.getElementById('slot-'+i).appendChild(createShape(SHAPES[Math.floor(Math.random()*SHAPES.length)]));
        }
    }

    function isGameOver() {
        const shapes = document.querySelectorAll('.shape-container');
        if(shapes.length === 0) return false;
        let anyFit = false;
        shapes.forEach(s => {
            const data = JSON.parse(s.dataset.info).d;
            for(let r=0; r<GRID; r++) {
                for(let c=0; c<GRID; c++) if(canFit(data, r, c)) anyFit = true;
            }
        });
        return !anyFit;
    }

    function finish() {
        document.getElementById('fs').innerText = score;
        document.getElementById('overlay').style.display = 'flex';
    }

    function clearPreviews() { cells.flat().forEach(c => c.classList.remove('preview')); }

    init();
</script>
</body>
</html>
